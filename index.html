<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Industrial Digital Partners</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        .reveal { opacity: 0; }
        /* Efecto de grano sutil */
        .noise {
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.03;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            z-index: 50;
        }
    </style>
</head>
<body class="bg-[#0a0a0c] text-slate-300 font-sans selection:bg-cyan-500/30">
    <div class="noise"></div>

    <section class="relative min-h-screen flex flex-col justify-center px-6 lg:px-24 border-b border-white/5 overflow-hidden">
        <div class="absolute inset-0 z-0 opacity-20">
            <img src="https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?auto=format&fit=crop&q=80&w=2070" alt="Tech Industrial" class="w-full h-full object-cover grayscale">
        </div>
        <div class="relative z-10 max-w-4xl">
            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-cyan-500/10 border border-cyan-500/20 mb-6">
                <span class="w-2 h-2 rounded-full bg-cyan-400 animate-pulse"></span>
                <span class="text-xs font-mono uppercase tracking-widest text-cyan-400">Partner Digital Industrial</span>
            </div>
            <h1 class="text-5xl md:text-7xl font-bold text-white mb-6 leading-tight">
                Digitalizamos la <span class="text-cyan-400">capacidad productiva</span> de tu PyME.
            </h1>
            <p class="text-xl text-slate-400 mb-10 max-w-2xl">SEO, SEM y Desarrollo Web para el sector industrial.</p>
            <div class="flex flex-wrap gap-4">
                <a href="#" class="px-8 py-4 bg-cyan-600 hover:bg-cyan-500 text-white font-semibold transition-all">Reservar consulta</a>
            </div>
        </div>
    </section>

    <section class="py-24 px-6 lg:px-24 reveal">
        <div class="grid md:grid-cols-3 gap-6">
            <div class="p-8 border border-white/10 bg-white/5 hover:border-cyan-500/50 transition-colors">
                <h4 class="text-xl font-bold text-white mb-4 italic">Auditoría Digital</h4>
                <div class="text-2xl font-bold text-cyan-400 mb-6">GRATIS</div>
                <p class="text-slate-400 text-sm">Detectamos fugas de clientes en tu ecosistema actual.</p>
            </div>
            </div>
    </section>

    <footer class="py-12 px-6 border-t border-white/10 text-center text-xs font-mono uppercase tracking-widest text-slate-600">
        © 2026 Industrial Digital Partners | 28 Reseñas 5 Estrellas
    </footer>

    <script>
        // Inicialización de animaciones
        gsap.registerPlugin(ScrollTrigger);
        gsap.utils.toArray('.reveal').forEach((el) => {
            gsap.to(el, {
                y: 0,
                opacity: 1,
                duration: 1,
                scrollTrigger: {
                    trigger: el,
                    start: "top 85%",
                }
            });
        });
    </script>
</body>
</html>
